<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <link rel="stylesheet" href="../css/pedidos.css">

<body>
    <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pedidos</title>

  
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>

<body>

<section class="section">

  <div class="container">


    <div class="box">

      
      <div class="box">
        <h1 class="title is-4 has-text-centered">
          Pedidos
        </h1>
      </div>

      <!-- COLUMNAS -->
      <div class="columns">

        <!-- LADO IZQUIERDO -->
        <div class="column is-3">

          <figure class="image is-128x128">
            <center><img src="https://cdn-icons-png.flaticon.com/128/7481/7481124.png"></center>
          </figure>

          <br>

       
        </div>
        <div class="column">

          <div class="box">

            <form>

              <div class="field">
                <label class="label">Producto</label>

                <div class="control">
                  <input class="input"
                  type="text"
                  placeholder="Ingrese el producto">
                </div>
              </div>

              
              <div class="field">
                <label class="label">Dirección</label>

                <div class="control">
                  <input class="input"
                  type="text"
                  placeholder="Ingrese la dirección">
                </div>
              </div>

              
              <div class="field">
                <label class="label">Nombre Del Usuario</label>

                <div class="control">
                  <input class="input"
                  type="text"
                  placeholder="Ingrese el nombre del usuario">
                </div>
              </div>

              
              <div class="field">
                <label class="label">Cantidad</label>

                <div class="control">
                  <input class="input"
                  type="number"
                  placeholder="Ingrese la cantidad">
                </div>
              </div>

              
              <div class="field">
                <label class="label">Método de Pago</label>

                <div class="control">
                  <textarea class="textarea"
                  placeholder="Ingrese el método de pago"></textarea>
                </div>
              </div>

              
              <div class="field">
                <label class="label">Teléfono</label>

                <div class="control">
                  <input class="input"
                  type="number"
                  placeholder="Ingrese el teléfono">
                </div>
              </div>

              <!-- BOTON -->
              <div class="field has-text-centered">

                <div class="control">
                  <button class="button is-dark is-medium">
                    Guardar
                  </button>
                </div>
                <div class="control">
                    <a href="../index.html">
                      <button type="button" class="button is-dark is-medium">
                        Volver a inicio
                      </button>
                    </a>
                  </div>

              </div>

            </form>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>

</body>
</html>

</body>
</html>
