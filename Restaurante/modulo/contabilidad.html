<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contabilidad</title>

  <!-- BULMA -->
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>

<body>

<section class="section">

  <div class="container">

    <!-- CAJA PRINCIPAL -->
    <div class="box">

      <!-- TITULO -->
      <div class="box">
        <h1 class="title is-4 has-text-centered">
          CONTABILIDAD
        </h1>
      </div>

      <!-- COLUMNAS -->
      <div class="columns">

        <!-- LADO IZQUIERDO -->
        <div class="column is-3">

          <figure class="image is-128x128">
            <center><img src="https://cdn-icons-png.flaticon.com/128/3135/3135715.png"></center>
          </figure>

          <br>

          <figure class="image is-128x128">
            <img src="https://bulma.io/images/placeholders/128x96.png">
          </figure>

        </div>
        <div class="column">

          <div class="box">

            <form>

              <div class="field">
                <label class="label">Ventas</label>

                <div class="control">
                  <input id="ventas" class="input"
                  type="text"
                  placeholder="Ingrese las ventas">
                </div>
              </div>

              <!-- FECHA -->
              <div class="field">
                <label id="fecha" class="label">Fecha</label>

                <div class="control">
                  <input id="fecha" class="input"
                  type="date">
                </div>
              </div>

              <!-- INGRESOS -->
              <div class="field">
                <label id="ingresos" class="label">Ingresos</label>

                <div class="control">
                  <input id="ingresos" class="input"
                  type="number"
                  placeholder="Ingrese ingresos">
                </div>
              </div>

              <!-- EGRESOS -->
              <div class="field">
                <label id="egresos" class="label">Egresos</label>

                <div class="control">
                  <input id="egresos" class="input"
                  type="number"
                  placeholder="Ingrese egresos">
                </div>
              </div>

              <!-- CONCEPTO -->
              <div class="field">
                <label id="concepto" class="label">Concepto</label>

                <div class="control">
                  <textarea id="concepto" class="textarea"
                  placeholder="Ingrese el concepto"></textarea>
                </div>
              </div>

              <!-- VALOR -->
              <div class="field">
                <label id="valor" class="label">Valor</label>

                <div class="control">
                  <input id="valor" class="input"
                  type="number"
                  placeholder="Ingrese el valor">
                </div>
              </div>

              <!-- BOTON -->
              <div class="field has-text-centered">

                <div class="control">
                  <button class="button is-dark is-medium">
                    Guardar
                  </button>
                </div>
                <div class="control">
                    <a href="../index.html">
                      <button type="button" class="button is-dark is-medium">
                        Volver a inicio
                      </button>
                    </a>
                  </div>
              </div>

            </form>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>

</body>
</html>

</body>
</html>
