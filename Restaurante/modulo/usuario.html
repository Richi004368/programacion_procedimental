<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <title>USUARIO</title>
</head>
<body>
   <div class="field">
  <label class="label">Nombre</label>
  <div class="control">
    <input class="input" type="text" placeholder="">
  </div>
</div>

<div class="field">
  <label class="label">Apellido</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-success" type="text" placeholder="" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
</div>

<div class="field">
  <label class="label">Cargo</label>
  <div class="control">
    <div class="select">
      <select>
        <option>Trabajador</option>
        <option>Usuario</option>
      </select>
    </div>
  </div>
</div>

<div class="field">
  <label class="label">Correo</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-danger" type="email" placeholder="correo" value="hello@">
    <span class="icon is-small is-left">
      <i class="fas fa-envelope"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-exclamation-triangle"></i>
    </span>
  </div>
  <p class="help is-danger">This email is invalid</p>
</div>

<div class="field">
  <p class="control has-icons-left">
    <input class="input" type="contraseña" placeholder="Contraseña">
    <span class="icon is-small is-left">
      <i class="fas fa-lock"></i>
    </span>
  </p>
</div>


<div class="field">
  <label class="label">Tipo De Documento</label>
  <div class="control">
    <div class="select">
      <select>
        <option>CE</option>
        <option>CC</option>
        <option>TI</option>
      </select>
    </div>
  </div>
</div>

<div class="field">
  <label class="label">Numero de Documento</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-success" type="text" placeholder="" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>

<div class="field">
  <label class="label">Genero</label>
  <div class="control">
    <div class="select">
      <select>
        <option>Masculino</option>
        <option>Femenino</option>
        <option>Otro</option>
      </select>
    </div>
  </div>
</div>

<div class="field">
  <div class="control">
    <label class="checkbox">
      <input type="checkbox">
      I agree to the <a href="#">terms and conditions</a>
    </label>
  </div>
</div>

<div class="field">
  <div class="control">
    <label class="radio">
      <input type="radio" name="question">
      Yes
    </label>
    <label class="radio">
      <input type="radio" name="question">
      No
    </label>
  </div>
</div>

<div class="field is-grouped">
  <div class="control">
    <button class="button is-link">Submit</button>
  </div>
  <div class="control">
    <button class="button is-link is-light">Cancel</button>
  </div>
</div>
</body>
</html>
